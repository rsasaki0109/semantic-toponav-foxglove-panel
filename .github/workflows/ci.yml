name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: install dependencies
        run: npm ci --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: jest
        run: npm test
      - name: build foxglove extension
        run: npm run build
      - name: assert dist/extension.js exists
        run: test -s dist/extension.js

      - name: package .foxe (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run package

      - name: upload .foxe artifact (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: foxe-${{ github.ref_name }}
          path: "*.foxe"
          if-no-files-found: error
