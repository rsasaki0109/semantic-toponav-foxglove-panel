name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install dependencies
        run: npm install --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: jest
        run: npm test
